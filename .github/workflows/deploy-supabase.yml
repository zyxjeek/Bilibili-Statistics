name: Deploy Supabase Migrations

on:
  workflow_dispatch:
  push:
    branches:
      - main
    paths:
      - "supabase/**"
      - ".github/workflows/deploy-supabase.yml"

concurrency:
  group: supabase-migrations-${{ github.ref }}
  cancel-in-progress: false

jobs:
  migrate:
    runs-on: ubuntu-latest
    timeout-minutes: 10
    env:
      SUPABASE_ACCESS_TOKEN: ${{ secrets.SUPABASE_ACCESS_TOKEN }}
      SUPABASE_DB_PASSWORD: ${{ secrets.SUPABASE_DB_PASSWORD }}
      SUPABASE_PROJECT_ID: ${{ secrets.SUPABASE_PROJECT_ID }}

    steps:
      - name: Check Supabase secrets
        id: secrets
        shell: bash
        run: |
          missing=()
          [[ -z "$SUPABASE_ACCESS_TOKEN" ]] && missing+=("SUPABASE_ACCESS_TOKEN")
          [[ -z "$SUPABASE_DB_PASSWORD" ]] && missing+=("SUPABASE_DB_PASSWORD")
          [[ -z "$SUPABASE_PROJECT_ID" ]] && missing+=("SUPABASE_PROJECT_ID")

          if (( ${#missing[@]} > 0 )); then
            echo "::notice::Skipping Supabase migrations. Missing secrets: ${missing[*]}"
            echo "configured=false" >> "$GITHUB_OUTPUT"
          else
            echo "configured=true" >> "$GITHUB_OUTPUT"
          fi

      - name: Checkout
        if: steps.secrets.outputs.configured == 'true'
        uses: actions/checkout@v4

      - name: Setup Supabase CLI
        if: steps.secrets.outputs.configured == 'true'
        uses: supabase/setup-cli@v2
        with:
          version: latest

      - name: Link Supabase project
        if: steps.secrets.outputs.configured == 'true'
        run: supabase link --project-ref "$SUPABASE_PROJECT_ID"

      - name: Push database migrations
        if: steps.secrets.outputs.configured == 'true'
        run: supabase db push
